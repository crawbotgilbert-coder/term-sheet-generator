metadata:
  style: metals-master
  version: 0.2.0
  description: Metals & mining holdco template clauses derived from KGL, Cariboo, Kisenda, and Yanqul precedents.

pricing:
  kgl_junior:
    title: "Junior Facility Pricing"
    body: |-
      - **Interest Rate:** Term SOFR + 7.50% p.a., paid monthly. No base-rate floor applies.
      - **Structuring Fee:** 1.00% of the Facility Amount, netted from the first utilisation.
      - **Commitment Fee:** 1.50% p.a. on undrawn commitments, payable quarterly until full draw or cancellation.
      - **Tenor:** 36 months overall (12-month grace + 24-month amortisation via offtake deductions).
      - **Voluntary Prepayment:** Permitted at any time without premium (standard break costs only).
  cariboo_tiered:
    title: "Tiered Margin Linked to Commercial Production"
    body: |-
      - **Base Rate:** 3M Term SOFR, 0% floor.
      - **Margin:** 7.50% p.a. prior to Commercial Production; steps down to 6.00% p.a. once certificates delivered.
      - **Fees:** 1.00% structuring fee (deducted from first draw) + 1.50% p.a. commitment fee on undrawn amounts (50% rebate if canceled pre-draw).
      - **Repayment:** 12-month grace followed by 36-month amortisation via offtake deductions.
      - **Use Case:** Use when lender wants upside pre-ramp with automatic recalibration post-stabilisation.
  yanqul_bridge:
    title: "Acquisition Bridge Bullet Pricing"
    body: |-
      - **Facility Size:** Lesser of USD 100m and 60% of purchase price.
      - **Interest:** Fixed 8.50% p.a., paid quarterly in arrears.
      - **Fees:** 1.50% structuring fee taken at utilisation.
      - **Cash Sweep:** 25% of Target cash above minimum each quarter.
      - **Term:** 12-month bullet; prepay anytime (break costs only). Certain Funds protections apply during Takeover period.

covenants:
  negative_pledge:
    title: "Negative Pledge"
    body: |-
      Borrower and guarantors shall not create or permit any lien on collateral securing the Facility, save for (i) pre-existing senior stream lenders under an agreed Intercreditor Agreement and (ii) liens consented to in writing by Mercuria. Any request for additional pari passu or senior security requires prior written approval.
  coverage_ratio:
    title: "Coverage Ratio Condition"
    body: |-
      Each utilisation (and periodically thereafter) requires demonstration that consolidated DSCR is at least 1.30× (never more restrictive than senior covenants). Compliance evidenced by the latest financial model certified by the Independent Technical Advisor or lender financial model.
  cash_sweep:
    title: "Target Cash Sweep"
    body: |-
      During the life of the Facility, 25% of consolidated cash held within the Target Group in excess of the agreed minimum balance shall be applied each quarter to prepay outstanding principal. The sweep is coordinated with the mandatory prepayment provisions of the Facility Agreement.
  sanctions:
    title: "Sanctions & Illegality"
    body: |-
      Borrower represents and covenants that it, its subsidiaries, and project assets are not the subject of sanctions administered by the UN, UK, EU, US, Australia, Canada, Switzerland, or Oman. Mandatory prepayment is triggered if continued participation becomes unlawful due to sanctions changes.
  project_mac:
    title: "Project MAC"
    body: |-
      "Material Adverse Change" means any change or event reasonably likely to have a material adverse effect on (i) project commissioning, (ii) achievement of first production, or (iii) performance of the Finance Documents. Incorporated in representations, drawstops, and CP bring-downs.

security:
  kisenda_first_lien:
    title: "Comprehensive Security Package"
    body: |-
      - First-ranking fixed and floating charges over all assets of the project entities.
      - Share pledges or mining licence pledge (PE15597) as perfected in relevant jurisdictions.
      - Corporate guarantees from intermediate and upstream holding companies plus sponsor-level guarantee.
      - Assignment of shareholder loans to ensure subordination.
      - Covenant that upstream dividends/loan repayments are applied toward project equity funding.
      - Parties cooperate in good faith to perfect the collateral stack in each jurisdiction.

conditions_precedent:
  project_prepayment:
    title: "Project CP Checklist"
    body: |-
      1. Diligence complete and full KYC on borrower group.
      2. Definitive Facility, Offtake, Guarantee, Intercreditor, and account control agreements executed.
      3. Corporate approvals and officer certificates for borrower, guarantors, and sponsor.
      4. All regulatory permits and security filings obtained.
      5. Local counsel enforceability and perfection opinions delivered.
      6. Independent Technical Advisor certificate dated ≤30 days pre-draw confirming schedule/budget and first production within 9 months.
      7. Evidence that equity and senior debt are fully committed/drawn before junior utilisation.
      8. Updated financial model showing covenant compliance.
      9. Bring-down of representations; no defaults or MAC.
      10. Confirmation that equity-first draw mechanics have been satisfied.

offtake:
  restructure_ack:
    title: "Offtake Protections"
    body: |-
      - Binding offtake agreements executed at closing between the borrower group and Mercuria; novated to project SPVs within 45 days.
      - Borrower remains guarantor of novated obligations.
      - Definitive documentation to include structural, contractual, and security support protecting Mercuria’s receivables (assignment of contracts, consent rights over amendments, security over collection accounts).
  copper_payability:
    title: "Copper Concentrate Payability Grid"
    body: |-
      **Copper:**
      - 20–30% Cu: 96.60% payable (1 unit deduction)
      - 30–33%: 96.60%
      - 33–35%: 96.70%
      - 35–38%: 96.75%
      - ≥38%: 96.80%

      **Silver:** 90% payable if ≥30 g/dmt (none below).

      **Gold:** 90% payable at 1–3 g/dmt up to 96.5% if ≥15 g/dmt. QP choice MOAS+1 or +5; include TC/RC schedule and impurity penalties (Bi, As, Sb, Pb+Zn, Hg, MgO, F).

governing_law:
  english_default:
    title: "Governing Law"
    body: |-
      This Term Sheet and any non-contractual obligations arising out of or in connection with it are governed by the laws of England and Wales. The parties submit to the exclusive jurisdiction of the courts of England and Wales.
  ontario_option:
    title: "Ontario Governing Law"
    body: |-
      This Term Sheet is governed by the laws of the Province of Ontario and the federal laws of Canada applicable therein. The parties submit to the non-exclusive jurisdiction of the courts of Ontario.

disclaimers:
  non_binding:
    title: "Non-Binding Nature"
    body: |-
      This Term Sheet is provided on a strictly private and confidential basis. Except for the provisions expressly stated to be binding (Confidentiality, Exclusivity, Governing Law, Fees & Expenses), it does not constitute an offer, commitment, or obligation by Mercuria. Any binding obligation will arise only upon execution of mutually agreed definitive documents.

binding:
  confidentiality:
    title: "Confidentiality"
    body: |-
      The recipient shall keep this Term Sheet and discussions with Mercuria strictly confidential and may only disclose to directors, employees, and advisers who need to know, provided they are bound by similar confidentiality obligations. Disclosure required by law/regulation is permitted with prior notice to Mercuria where practicable.
  exclusivity:
    title: "Exclusivity"
    body: |-
      For 60 days from acceptance, the borrower and sponsor agree not to solicit or discuss competing junior financing proposals covering the same scope without Mercuria’s consent.
  fees_expenses:
    title: "Fees & Expenses"
    body: |-
      Borrower bears its own costs and reimburses Mercuria’s documented external legal and technical adviser fees whether or not the definitive documents are executed.
