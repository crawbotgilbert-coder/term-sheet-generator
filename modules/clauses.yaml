metadata:
  currency: USD
  version: 0.1.0

sections:
  transaction-overview:
    title: Transaction Overview
    fields:
      - key: borrower
        label: Borrower
        template: "{borrower_name} ({jurisdiction})"
      - key: facility
        label: Facility
        template: "{facility_type}"
      - key: amount
        label: Facility Size
        template: "{facility_size} {currency}"
      - key: purpose
        label: Use of Proceeds
        template: "{use_of_proceeds}"

  pricing:
    title: Pricing & Economics
    clauses:
      - id: margin
        label: Margin
        body: "{margin_bps} bps over SOFR (floor {sofr_floor}%)."
      - id: upfront
        label: Upfront Fee
        body: "{upfront_fee_pct}% of commitments, payable at signing."
      - id: commitment
        label: Commitment Fee
        body: "{commitment_fee_pct}% p.a. on undrawn commitments."

  covenants:
    title: Covenants
    clauses:
      - id: leverage
        label: Maximum Net Leverage
        body: >
          Net leverage not to exceed {leverage_limit}x. Cure period of {cure_period_days} days.
      - id: liquidity
        label: Minimum Liquidity
        body: >
          Maintain unrestricted cash plus revolver availability of at least {min_liquidity} {currency}.
      - id: hedging
        label: Hedging Program
        body: >
          Borrower to hedge not less than {hedging_pct}% of Cu production for the next {hedging_months} months via approved counterparties.

  security:
    title: Security Package
    clauses:
      - id: share-pledge
        label: Share Pledge
        body: "Pledge over 100% of HoldCo shares and downstream subsidiaries."
      - id: assets
        label: Assets
        body: >
          First-ranking fixed and floating charges over material project assets, receivables, and bank accounts.
      - id: offtake
        label: Offtake Assignment
        body: >
          Assignment of offtake contracts with Mercuria, including step-in rights on default.

  events-of-default:
    title: Events of Default
    clauses:
      - id: payment-default
        label: Payment Default
        body: Payment default with 5 business day grace period.
      - id: cross-default
        label: Cross-Default
        body: Cross-default threshold of {cross_default_threshold} {currency}.
      - id: change-of-control
        label: Change of Control
        body: Immediate mandatory prepayment at 101% upon change of control.
